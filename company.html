                                    <!-- 検索エンジン(Google等)に名前のテキストを紐付けさせないためのCanvas画像化処理 -->
                                    <canvas id="rep-canvas" width="120" height="30" style="vertical-align: middle;"></canvas>
                                    <script>
                                        const canvas = document.getElementById('rep-canvas');
                                        const ctx = canvas.getContext('2d');
                                        // スマホなどの高解像度（Retina）ディスプレイでも文字がぼやけないようスケール調整
                                        const scale = window.devicePixelRatio || 1;
                                        canvas.width = 120 * scale;
                                        canvas.height = 30 * scale;
                                        canvas.style.width = "120px";
                                        canvas.style.height = "30px";
                                        ctx.scale(scale, scale);
                                        
                                        // テキストの描画設定 (周りのデザインと合わせたフォントスタイル)
                                        ctx.font = "600 17.6px 'Inter', 'Noto Sans JP', sans-serif";
                                        ctx.fillStyle = "#111115"; 
                                        ctx.textBaseline = "middle";
                                        ctx.fillText("十亀 侑矢", 0, 16);
                                    </script>
